name: Shell Lint

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -type f \
            -not -path './venv/*' \
            -not -path './generated-networkpolicies/*' \
            -not -path './complianceremediations/*' \
            -not -path './test-runs/*' \
            -not -path './testing/*' \
            -not -path './docs/vendor/*' \
            | xargs shellcheck -e SC1091,SC2034,SC2086,SC2001,SC2028,SC2129,SC2155,SC2317,SC2329

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.10.0
          wget -qO /tmp/shfmt "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
      - name: Run shfmt
        run: shfmt -d core utilities modular lab-tools misc scripts
