name: Shell Lint

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -type f -name '*.sh' \
            -not -path './.*' \
            -not -path '*/\.*' \
            -print0 | xargs -0 shellcheck --severity=warning

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.10.0
          wget -qO /tmp/shfmt "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
      - name: Run shfmt
        run: shfmt -d core utilities modular lab-tools misc
