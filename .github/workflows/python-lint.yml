name: Python Lint and Test

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make shellcheck
      - name: Run linting
        run: make python-lint

  python-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install pytest pyyaml
      - name: Run tests
        run: make python-test

  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install mypy pyyaml types-PyYAML types-requests types-beautifulsoup4
      - name: Run mypy
        continue-on-error: true
        run: mypy --ignore-missing-imports core/*.py scripts/*.py modular/*.py misc/*.py
