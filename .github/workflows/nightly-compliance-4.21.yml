name: Nightly Compliance - OCP 4.21

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      co_ref:
        description: 'Compliance Operator version (e.g., v1.7.0, v1.8.2)'
        required: false
        default: 'v1.7.0'

permissions: read-all

jobs:
  nightly-compliance:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'sebrandon1'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify CRC_PULL_SECRET is set
        env:
          CRC_PULL_SECRET: ${{ secrets.CRC_PULL_SECRET }}
        run: |
          if [ -z "${CRC_PULL_SECRET}" ]; then
            echo "CRC_PULL_SECRET secret is required but not set."
            exit 1
          fi

      - name: Setup OCP 4.21 cluster
        uses: palmsoftware/quick-ocp@v0.0.30
        with:
          ocpPullSecret: $OCP_PULL_SECRET
          desiredOCPVersion: "4.21"
          bundleCache: true
          waitForOperatorsReady: true
        env:
          OCP_PULL_SECRET: ${{ secrets.CRC_PULL_SECRET }}

      - name: Verify cluster version
        run: |
          oc get clusterversion
          VERSION=$(oc get clusterversion version -o jsonpath='{.status.desired.version}')
          echo "Cluster version: $VERSION"
          echo "$VERSION" | grep -q "4.21" || (echo "ERROR: Expected 4.21.x, got $VERSION" && exit 1)

      - name: Install Compliance Operator
        run: CO_REF=${{ github.event.inputs.co_ref || 'v1.7.0' }} make install-compliance-operator

      - name: Deploy E8 scans (both master and worker roles)
        run: |
          cat <<'EOF' | oc apply -f -
          apiVersion: compliance.openshift.io/v1alpha1
          kind: ScanSetting
          metadata:
            name: nightly-setting
            namespace: openshift-compliance
          roles:
            - worker
            - master
          scanTolerations:
            - operator: Exists
          schedule: "0 1 * * *"
          ---
          apiVersion: compliance.openshift.io/v1alpha1
          kind: ScanSettingBinding
          metadata:
            name: nightly-e8
            namespace: openshift-compliance
          profiles:
            - name: rhcos4-e8
              kind: Profile
              apiGroup: compliance.openshift.io/v1alpha1
            - name: ocp4-e8
              kind: Profile
              apiGroup: compliance.openshift.io/v1alpha1
          settingsRef:
            name: nightly-setting
            kind: ScanSetting
            apiGroup: compliance.openshift.io/v1alpha1
          EOF

      - name: Wait for scans to complete
        run: |
          for i in $(seq 1 80); do
            DONE=$(oc get compliancesuite -n openshift-compliance --no-headers 2>/dev/null | grep -c DONE || true)
            TOTAL=$(oc get compliancesuite -n openshift-compliance --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "[$i/80] $DONE/$TOTAL suites DONE"
            if [ "$TOTAL" -gt 0 ] && [ "$DONE" -eq "$TOTAL" ]; then
              echo "All scans complete!"
              break
            fi
            if [ "$i" -eq 80 ]; then
              echo "ERROR: Scans did not complete within 20 minutes"
              oc get compliancesuite -n openshift-compliance
              exit 1
            fi
            sleep 15
          done

      - name: Validate expected results
        run: ./tests/validate-results.sh tests/expected-results-4.21.json

      - name: Export results artifact
        if: always()
        run: |
          oc get compliancecheckresults -n openshift-compliance -o json > compliance-results-4.21.json || true
          oc get compliancesuite -n openshift-compliance -o yaml > compliance-suites-4.21.yaml || true
          ./tests/generate-expected.sh 4.21 2>/dev/null && mv tests/expected-results-4.21.json actual-baseline-4.21.json || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compliance-results-4.21
          path: |
            compliance-results-4.21.json
            compliance-suites-4.21.yaml
            actual-baseline-4.21.json
